<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Y.E.S.I CONCEPT — Suivi Joueur</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c7a74d;
--gold-light:#e7c977;
--dark:#050505;
--dark2:#0d0d0d;
--dark3:#171717;
--white:#f5f5f5;
--muted:#9d9d9d;

--mental-bg:#ffffff;
--mental-text:#2A2A2A;
--mental-border:#E6E0D4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--dark);
color:var(--white);
font-family:'DM Sans',sans-serif;
overflow-x:hidden;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:90px 24px 70px;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top, rgba(199,167,77,0.12), transparent 60%),
linear-gradient(to bottom,#080808,#050505);
}

.hero-bg{
position:absolute;
top:-10px;
left:-10px;
font-family:'Bebas Neue',sans-serif;
font-size:170px;
line-height:1;
color:rgba(199,167,77,0.04);
pointer-events:none;
letter-spacing:3px;
}

.hero-logo{
width:140px;
margin-bottom:30px;
display:block;
}

.tag{
font-size:11px;
letter-spacing:3px;
text-transform:uppercase;
color:var(--gold);
margin-bottom:18px;
}

.hero h1{
font-family:'Bebas Neue',sans-serif;
font-size:96px;
line-height:0.88;
letter-spacing:2px;
margin-bottom:14px;
}

.hero-sub{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
letter-spacing:3px;
color:#8f8f8f;
margin-bottom:26px;
}

.hero p{
max-width:520px;
font-size:15px;
line-height:1.8;
color:var(--muted);
border-left:2px solid var(--gold);
padding-left:16px;
}

/* GENERAL SECTION */

.section{
padding:80px 24px;
max-width:1200px;
margin:auto;
}

.section-label{
font-size:10px;
letter-spacing:3px;
text-transform:uppercase;
color:#796431;
margin-bottom:8px;
}

.section-title{
font-family:'Bebas Neue',sans-serif;
font-size:64px;
line-height:0.95;
letter-spacing:2px;
margin-bottom:18px;
}

.section-text{
font-size:15px;
line-height:1.8;
color:var(--muted);
max-width:650px;
margin-bottom:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

/* CARD */

.card{
background:linear-gradient(180deg,var(--dark3),var(--dark2));
border:1px solid rgba(199,167,77,0.08);
padding:28px;
position:relative;
overflow:hidden;
transition:.25s;
}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:2px;
background:var(--gold);
opacity:.7;
}

.card:hover{
transform:translateY(-4px);
border-color:rgba(199,167,77,0.3);
box-shadow:0 0 25px rgba(199,167,77,0.08);
}

.card-icon{
font-size:34px;
margin-bottom:18px;
}

.card h3{
font-family:'Bebas Neue',sans-serif;
font-size:36px;
letter-spacing:1px;
margin-bottom:10px;
}

.card p{
font-size:14px;
line-height:1.7;
color:var(--muted);
margin-bottom:22px;
}

/* BUTTON */

.tool-btn{
display:flex;
justify-content:center;
align-items:center;
width:100%;
padding:16px;
background:var(--gold);
color:#000;
text-decoration:none;
font-family:'Bebas Neue',sans-serif;
font-size:20px;
letter-spacing:1px;
transition:.2s;
}

.tool-btn:hover{
transform:scale(1.02);
box-shadow:0 0 25px rgba(199,167,77,0.25);
}

/* MENTAL */

.mental-page{
background:var(--mental-bg);
color:var(--mental-text);
padding-bottom:80px;
}

.mental-header{
padding:90px 24px 70px;
border-bottom:1px solid var(--mental-border);
}

.mental-kicker{
font-size:10px;
letter-spacing:4px;
text-transform:uppercase;
color:var(--gold);
margin-bottom:28px;
}

.mental-title{
font-family:'Bebas Neue',sans-serif;
font-size:92px;
line-height:.9;
color:#000;
margin-bottom:24px;
}

.mental-title em{
font-family:'Cormorant Garamond',serif;
font-style:italic;
font-weight:300;
color:var(--gold);
}

.mental-desc{
max-width:650px;
font-size:16px;
line-height:1.9;
color:#666;
}

.mental-container{
max-width:1200px;
margin:auto;
padding:0 24px;
}

.mental-intro{
padding:70px 0;
border-bottom:1px solid var(--mental-border);
}

.mental-intro p{
font-family:'Cormorant Garamond',serif;
font-size:32px;
line-height:1.6;
font-weight:300;
color:#111;
max-width:900px;
}

.mental-intro strong{
color:var(--gold);
}

.mental-section-title{
padding:60px 0 30px;
font-family:'Bebas Neue',sans-serif;
font-size:58px;
letter-spacing:2px;
color:#000;
border-bottom:1px solid var(--mental-border);
}

.mental-axe{
padding:55px 0;
border-bottom:1px solid var(--mental-border);
display:grid;
grid-template-columns:1fr;
gap:34px;
}

.mental-left small{
font-size:11px;
letter-spacing:3px;
color:var(--gold);
display:block;
margin-bottom:14px;
}

.mental-left h3{
font-family:'Bebas Neue',sans-serif;
font-size:68px;
line-height:.92;
color:#000;
}

.mental-left span{
display:block;
margin-top:10px;
font-family:'Cormorant Garamond',serif;
font-size:20px;
font-style:italic;
color:var(--gold);
}

.mental-right p{
font-size:15px;
line-height:1.9;
color:#666;
margin-bottom:28px;
}

.mental-pillars{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px 24px;
margin-bottom:24px;
}

.mental-pill{
font-size:14px;
color:#222;
position:relative;
padding-left:16px;
}

.mental-pill::before{
content:'';
position:absolute;
left:0;
top:8px;
width:5px;
height:5px;
border-radius:50%;
background:var(--gold);
}

.mental-quote{
padding-left:18px;
border-left:1px solid var(--gold);
font-family:'Cormorant Garamond',serif;
font-style:italic;
font-size:18px;
line-height:1.7;
color:var(--gold);
}

/* GUIDE */

.steps{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

.step{
padding:22px;
background:var(--dark3);
border-left:2px solid var(--gold);
}

.step strong{
display:block;
font-family:'Bebas Neue',sans-serif;
font-size:28px;
letter-spacing:1px;
margin-bottom:8px;
color:var(--gold-light);
}

.step span{
font-size:14px;
line-height:1.7;
color:var(--muted);
}

/* CTA */

.cta{
padding:100px 24px;
text-align:center;
background:
radial-gradient(circle at center, rgba(199,167,77,0.08), transparent 60%);
}

.cta h2{
font-family:'Bebas Neue',sans-serif;
font-size:74px;
line-height:0.95;
letter-spacing:2px;
margin-bottom:18px;
}

.cta p{
font-size:15px;
color:var(--muted);
margin-bottom:35px;
}

.main-btn{
display:inline-flex;
justify-content:center;
align-items:center;
padding:22px 34px;
background:var(--gold);
color:#000;
text-decoration:none;
font-family:'Bebas Neue',sans-serif;
font-size:24px;
letter-spacing:2px;
min-width:310px;
transition:.25s;
}

.main-btn:hover{
transform:scale(1.03);
box-shadow:0 0 35px rgba(199,167,77,0.28);
}

/* FOOTER */

.footer{
padding:45px 24px 70px;
text-align:center;
border-top:1px solid rgba(199,167,77,0.08);
}

.footer-logo{
font-family:'Bebas Neue',sans-serif;
font-size:24px;
letter-spacing:5px;
color:var(--gold);
margin-bottom:10px;
}

.footer p{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#666;
line-height:1.8;
}

/* RESPONSIVE */

@media(min-width:768px){

.hero{
padding:120px 60px 80px;
}

.hero-bg{
font-size:260px;
}

.hero h1{
font-size:150px;
}

.hero-sub{
font-size:32px;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.section{
padding:100px 60px;
}

.cta h2{
font-size:120px;
}

.mental-header{
padding:120px 60px 80px;
}

.mental-container{
padding:0 60px;
}

.mental-title{
font-size:150px;
}

.mental-axe{
grid-template-columns:320px 1fr;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-bg">
SUIVI
</div>

<img src="logo.png" alt="Logo Y.E.S.I CONCEPT" class="hero-logo">

<div class="tag">
Y.E.S.I CONCEPT — HUB SPORTIF
</div>

<h1>
SUIVI<br>
JOUEUR
</h1>

<div class="hero-sub">
ORGANISATION • DISCIPLINE • PERFORMANCE
</div>

<p>
Une plateforme autonome pensée pour les sportifs souhaitant structurer leur quotidien, optimiser leurs habitudes et suivre leur progression.
</p>

</section>

</body>
</html>
